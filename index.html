<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday HOANG_DIEM 🎂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#2d0a1a;
  --bg2:#4a1030;
  --pink1:#c0396b;
  --pink2:#e05585;
  --pink3:#f7a8c4;
  --pink4:#ffd6e8;
  --gold:#f8c8a0;
}
body{background:var(--bg1);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;color:#fff;overflow-x:hidden;}

.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0;}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:0.7;}90%{opacity:0.5;}100%{transform:translateY(-20px);opacity:0;}}

#cover{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,var(--bg1),var(--bg2));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:20px;transition:opacity 0.8s,transform 0.8s;}
#cover h1{font-size:clamp(2rem,8vw,3.5rem);color:var(--pink4);letter-spacing:2px;text-shadow:0 0 30px var(--pink2);}
#cover p{font-size:clamp(1rem,4vw,1.3rem);color:var(--pink3);opacity:0.9;}
.enter-btn{margin-top:10px;padding:14px 40px;background:var(--pink1);border:none;border-radius:50px;color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;box-shadow:0 0 30px var(--pink2);animation:pulse 2s ease-in-out infinite;transition:transform 0.2s;}
.enter-btn:hover{transform:scale(1.07);}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--pink2);}50%{box-shadow:0 0 50px var(--pink2),0 0 80px var(--pink1);}}

#main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px;display:none;}

.header{text-align:center;padding:40px 20px 10px;}
.header h1{font-size:clamp(2rem,7vw,3rem);color:var(--pink4);text-shadow:0 0 20px var(--pink2);}
.header p{font-size:1.05rem;color:var(--pink3);opacity:0.85;margin-top:8px;}

/* WISH SECTION: card with image + text side by side */
.wishes-section{padding:24px 0 40px;}
.wishes-section h2{text-align:center;font-size:1.8rem;color:var(--pink4);margin-bottom:24px;text-shadow:0 0 15px var(--pink2);}

.wish-card{
  background:var(--bg2);
  border:1.5px solid var(--pink1);
  border-radius:20px;
  margin-bottom:18px;
  overflow:hidden;
  display:flex;
  align-items:stretch;
  cursor:pointer;
  transition:transform 0.3s,box-shadow 0.3s;
  min-height:160px;
}
.wish-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(224,85,133,0.35);}
.wish-card:nth-child(even){flex-direction:row-reverse;}

.wish-img{
  width:140px;min-width:140px;
  overflow:hidden;
  flex-shrink:0;
}
.wish-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s;}
.wish-card:hover .wish-img img{transform:scale(1.06);}

.wish-body{
  padding:18px 20px;
  flex:1;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;
}
.wish-body::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(192,57,107,0.08),transparent);pointer-events:none;}
.wish-icon{font-size:1.8rem;margin-bottom:6px;}
.wish-body h3{color:var(--pink4);font-size:1.1rem;margin-bottom:8px;font-weight:600;}
.wish-body p{color:#f5c8d8;line-height:1.7;font-size:0.93rem;}
.read-more{display:inline-block;margin-top:10px;color:var(--pink2);font-size:0.85rem;font-weight:600;}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(30,0,15,0.96);align-items:center;justify-content:center;flex-direction:column;padding:10px;}
#lightbox.show{display:flex;}
#lightbox img{max-width:95vw;max-height:80vh;object-fit:contain;border-radius:12px;border:2px solid var(--pink1);}
#lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--pink3);font-size:2.5rem;cursor:pointer;}
#lb-nav{display:flex;gap:20px;margin-top:16px;}
#lb-nav button{padding:10px 28px;border-radius:30px;background:var(--bg2);border:1.5px solid var(--pink1);color:#fff;font-size:1rem;cursor:pointer;transition:background 0.2s;}
#lb-nav button:hover{background:var(--pink1);}

/* Wish detail modal */
#wish-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(20,0,10,0.96);align-items:center;justify-content:center;padding:20px;}
#wish-modal.show{display:flex;}
.modal-box{background:var(--bg2);border:2px solid var(--pink1);border-radius:20px;max-width:500px;width:100%;text-align:center;box-shadow:0 0 50px rgba(224,85,133,0.4);overflow:hidden;position:relative;}
.modal-img{width:100%;height:200px;object-fit:cover;display:block;}
.modal-body{padding:24px 24px 28px;}
.modal-body .icon{font-size:2.5rem;}
.modal-body h3{font-size:1.4rem;color:var(--pink4);margin:10px 0 14px;}
.modal-body p{color:#f5c8d8;line-height:1.85;font-size:1rem;}
.modal-close{margin-top:20px;padding:12px 36px;background:var(--pink1);border:none;border-radius:30px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
.modal-close:hover{background:var(--pink2);}

.footer{text-align:center;padding:30px 20px;color:var(--pink3);opacity:0.55;font-size:0.9rem;}

@media(max-width:480px){
  .wish-img{width:110px;min-width:110px;}
  .wish-body{padding:14px 14px;}
  .wish-body h3{font-size:1rem;}
}
</style>
</head>

      <p id="m-text"></p>
      <button class="modal-close" onclick="closeWish()">Đóng lại 💕</button>

  </div>
</div>

// Build wish cards
const wishList = document.getElementById('wish-list');
wishes.forEach((w, i) => {
  const card = document.createElement('div');
  card.className = 'wish-card';
  card.innerHTML = `
    <div class="wish-img"><img src="${images[w.imgIdx]}" alt="${w.title}" loading="lazy"></div>
    <div class="wish-body">
      <div class="wish-icon">${w.icon}</div>
      <h3>${w.title}</h3>
      <p>${w.preview}</p>
      <span class="read-more">Nhấn để đọc đầy đủ ›</span>
    </div>`;
  card.onclick = () => openWish(i);
  wishList.appendChild(card);
});

// Particles
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#e05585','#f7a8c4','#ffd6e8','#c0396b','#f8c8a0'];
  for(let i=0;i<40;i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random()*7+3;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*12}s;`;
    container.appendChild(p);
  }
}
createParticles();

function enterSite() {
  const cover = document.getElementById('cover');
  cover.style.opacity='0';cover.style.transform='scale(1.05)';
  setTimeout(()=>{cover.style.display='none';document.getElementById('main').style.display='block';},800);
}

// Lightbox (click on modal image)
let lbIndex = 0;
function openLightbox(i) {
  lbIndex = i;
  document.getElementById('lb-img').src = images[i];
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function lbPrev() { lbIndex=(lbIndex-1+images.length)%images.length; document.getElementById('lb-img').src=images[lbIndex]; }
function lbNext() { lbIndex=(lbIndex+1)%images.length; document.getElementById('lb-img').src=images[lbIndex]; }
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===document.getElementById('lightbox')) closeLightbox(); });

// Wish modal
function openWish(i) {
  const w = wishes[i];
  document.getElementById('m-img').src = images[w.imgIdx];
  document.getElementById('m-img').onclick = () => { closeWish(); openLightbox(w.imgIdx); };
  document.getElementById('m-img').style.cursor = 'zoom-in';
  document.getElementById('m-icon').textContent = w.icon;
  document.getElementById('m-title').textContent = w.title;
  document.getElementById('m-text').textContent = w.full;
  document.getElementById('wish-modal').classList.add('show');
}
function closeWish() { document.getElementById('wish-modal').classList.remove('show'); }
document.getElementById('wish-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('wish-modal')) closeWish(); });
</script>
