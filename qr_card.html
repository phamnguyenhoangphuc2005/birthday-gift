<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR - Happy Birthday</title>
<style>
body{margin:0;background:#2d0a1a;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:#4a1030;border:3px solid #e05585;border-radius:24px;padding:40px 32px;text-align:center;max-width:360px;box-shadow:0 0 60px rgba(224,85,133,0.4);}
.card h1{color:#ffd6e8;font-size:1.6rem;margin-bottom:6px;}
.card p{color:#f7a8c4;font-size:1rem;margin-bottom:24px;}
.qr-wrap{background:#ffd6e8;border-radius:16px;padding:16px;display:inline-block;}
.qr-wrap img{width:200px;height:200px;display:block;}
.hint{color:#ffd6e8;font-size:0.9rem;margin-top:20px;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:2.5rem;margin-bottom:8px;">🌸</div>
  <h1>Happy Birthday!</h1>
  <p>Quét mã QR để xem<br>trang chúc mừng đặc biệt</p>
  <div class="qr-wrap">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://phamnguyenhoangphuc2005.github.io/birthday-gift/" alt="QR Code">  </div>
  <div class="hint">📱 Quét bằng camera điện thoại<br>hoặc mở file <strong>birthday.html</strong><br>trên máy tính</div>
</div>
</body>
</html>
